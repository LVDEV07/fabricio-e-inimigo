
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - admin</title>
    <link rel="stylesheet" th:href="@{/css/styleLivroAdmin.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

</head>
<body>



    <header>
        <div class="container">
            <div class="logo">
                <img th:src="@{/images/BIBLIOTECH.png}" alt="logo">
                <h1>Bibliotech</h1>
            </div>

            <div class="botoes">
                <a class="btn-novo" th:href="@{/home/cadastroLivro}" sec:authorize="hasRole('ADMIN')">+ Novo livro</a>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="Btn">

                        <div class="sign"><svg viewBox="0 0 512 512"><path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path></svg></div>

                        <div class="text">Sair</div>
                    </button>


                </form>
            </div>
        </div>
    </header>


    <div th:if="${mensagemErro}">
        <p th:text="${mensagemErro}"></p>
    </div>
    <div th:if="${mensagemSucesso}">
        <p th:text="${mensagemSucesso}"></p>
    </div>

    <form th:action="@{/home}" method="get">
        <select name="genero" onchange="this.value === 'todos' ? window.location.href='/home' : this.form.submit()">
            <option value="todos" th:selected="${param.genero == null or param.genero.isEmpty()}">Todos os gêneros</option>
            <option th:each="genero : ${generos}"
                    th:value="${genero}"
                    th:text="${genero}"
                    th:selected="${#strings.equals(param.genero, genero)}">
            </option>
        </select>
    </form>

    <section>

        <div class="card" th:each="livro : ${livros}">
        <img th:src="${livro.urlCapa}" th:alt="${livro.nome}">
        <p class="card-nome" th:text="${livro.nome}"></p>
        <p class="card-autor" th:text="${livro.autor}"></p>
        <div class="card-acoes">
            <a class="btn-editar" th:href="@{/home/editarLivro/{id}(id=${livro.id})}" sec:authorize="hasRole('ADMIN')">Editar</a>
            <a class="btn-excluir" th:href="@{/home/excluir/{id}(id=${livro.id})}" sec:authorize="hasRole('ADMIN')">Excluir</a>
            <form th:action="@{/home/alugar/{id}(id=${livro.id})}" method="post" sec:authorize="hasRole('ALUNO')">
                <button type="submit" class="btn-excluir"
                        th:disabled="${livrosAlugados.contains(livro.id)}"
                        th:text="${livrosAlugados.contains(livro.id)} ? 'Indisponível' : 'Alugar'">
                </button>
            </form>
            </div>
        </div>

        <p th:if="${livros.isEmpty()}">Nenhum livro encontrado</p>

    </section>

</body>
</html>
