
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - admin</title>
    <link rel="stylesheet" th:href="@{/css/styleLivroAdmin.css}">

</head>
<body>

<div class="cabecalho">
    <img th:src="@{/images/BIBLIOTECH.png}" alt="logo">
    <h1>Bibliotech</h1>
    <a class="btn-novo" th:href="@{/home/cadastroLivro}">+ Novo livro</a>
</div>

<div class="grade">

    <div class="card" th:each="livro : ${livros}">
        <img th:src="${livro.urlCapa}" th:alt="${livro.nome}">
        <p class="card-nome" th:text="${livro.nome}"></p>
        <p class="card-autor" th:text="${livro.autor}"></p>
        <div class="card-acoes">
            <a class="btn-editar" th:href="@{/home/editarLivro/{id}(id=${livro.id})}">Editar</a>
            <a class="btn-excluir" th:href="@{/home/excluir/{id}(id=${livro.id})}">Excluir</a>
        </div>
    </div>

    <p th:if="${livros.isEmpty()}">Nenhum livro encontrado</p>

</div>

</body>
</html>
