<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">
</head>
<body>
<div class="container">
    <h3>Login</h3>
        <div class="form">
            <div class="login-email">
                <p>E-mail:</p>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="login-senha">
                <p>Senha:</p>
                <input type="password" placeholder="senha" required>
            </div>
            <div class="login-botoes">
                <button class="btn-admin">Administrador</button>
                <button class="btn-aluno">Aluno</button>
            </div>
            <div class="avancar">
                <button class="btn-avancar">Avançar</button>
            </div>
        </div>
</div>
</body>
</html>
