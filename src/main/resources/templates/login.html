<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">
    <link rel="icon" type="image/png" href="img/BIBLIOTECH.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
</head>

<body>
    <section>
        <form method="post" th:action="@{/login}">
            <div class="login">

                <div class="cabecalho">
                    <img th:src="@{/images/BIBLIOTECH.png}" alt="logo">
                    <h1>BIBLIOTECH</h1>
                </div>

                <h3>Login</h3>
                <div class="login-email">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="username" placeholder="   Digite seu email:" required autofocus>

                </div>
                <div class="login-senha">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" placeholder="   Digite sua senha:" required>
                </div>

                <div class="sem-conta">
                    <p>Não tem conta? <a th:href="@{/cadastro}">Cadastre-se</a></p>
                </div>

                <div class="avancar">
                    <button class="btn-avancar" type="submit">Avançar</button>
                </div>
            </div>
        </form>
</section>
</body>
</html>
