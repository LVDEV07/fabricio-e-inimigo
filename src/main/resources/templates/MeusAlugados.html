<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Alugados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #C4703A;
            color: #F5D5B8;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 32px;
        }
        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .cabecalho h1 { font-size: 24px; color: #F0E0CC; margin: 0; }
        .cabecalho img { width: 80px; height: auto; }
        .btn-voltar {
            background-color: #5C1F0A;
            color: #F5D5B8;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            text-decoration: none;
        }
        .grade { display: flex; flex-wrap: wrap; gap: 24px; }
        .card {
            background-color: #F0E0CC;
            border-radius: 10px;
            border: 1px solid #E0A070;
            width: 180px;
            padding: 16px;
        }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 6px; }
        .card-nome { font-size: 14px; font-weight: bold; color: #1E0C04; margin: 12px 0 4px 0; }
        .card-autor { font-size: 13px; color: #3A1A0A; margin: 0 0 4px 0; }
        .card-data { font-size: 12px; color: #8A3E18; margin: 0 0 12px 0; }
    </style>
</head>
<body>

<div class="cabecalho">
    <img th:src="@{/images/BIBLIOTECH.png}" alt="logo">
    <h1>Meus Alugados</h1>
    <a class="btn-voltar" th:href="@{/home}">Voltar</a>
</div>

<div class="grade">
    <div class="card" th:each="livro : ${livros}">
        <img th:src="${livro.urlCapa}" th:alt="${livro.nome}">
        <p class="card-nome" th:text="${livro.nome}"></p>
        <p class="card-autor" th:text="${livro.autor}"></p>
        <p class="card-data" th:text="'Devolver até: ' + ${#temporals.format(dataDevolucao, 'dd/MM/yyyy')}"></p>
    </div>
</div>

<p th:if="${livros.isEmpty()}">Nenhum livro alugado</p>

</body>
</html>
