<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>
<div th:if = "${mensagemErro}">
    <p th:text = "${mensagemErro}"></p>
</div>

<h1 th:text = "${user.id == null } ? 'Novo User' : 'Atualizar User' "></h1>
<form th:object="${user}" method="post" th:action="@{/salvar}">

    <input type="hidden" th:field="*{id} ">

    <label>Nome: </label>
    <input type="text" th:field="*{nome}">

    <label>Email: </label>
    <input type="email" th:field="*{email}">

    <label>Senha: </label>
    <input type="password" th:field="*{senha}">

    <label>Cargo: </label>
    <select th:field="*{cargo}">
        <option value="">Selecione...</option>
        <option th:each="cargo : ${cargos}"
                th:value="${cargo}"
                th:text="${cargo}">
        </option>
    </select>


    <br>

    <button type="submit">
        Salvar
    </button>
    <a th:href="@{/}">Cancelar</a>
</form>

<div th:if = "${mensagemEmail}">
    <p th:text = "${mensagemEmail}"></p>
</div>
</body>
</html>
